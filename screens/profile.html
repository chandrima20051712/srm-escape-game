<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRM Escape Game - Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: white;
            background: radial-gradient(circle at top, #2e7d32 0%, #1b5e20 55%, #0f3d16 100%);
            padding: 1.5rem;
        }
        .wrap {
            max-width: 980px;
            margin: 0 auto;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .back {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-weight: 600;
        }
        h1 {
            font-size: 2rem;
            font-weight: 900;
        }
        .hero {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .card {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 20px;
            padding: 1.25rem;
            backdrop-filter: blur(10px);
        }
        .profile-card {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .avatar {
            width: 88px;
            height: 88px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ffd700, #ffa000);
            color: #1b5e20;
            font-size: 2rem;
            font-weight: 900;
            flex: none;
        }
        .name { font-size: 1.5rem; font-weight: 900; margin-bottom: 0.2rem; }
        .email { color: rgba(255,255,255,0.7); font-size: 0.9rem; margin-bottom: 0.8rem; }
        .badges { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .badge {
            padding: 0.45rem 0.7rem;
            border-radius: 999px;
            background: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.85);
            font-size: 0.8rem;
            font-weight: 700;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .stat {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 1rem;
        }
        .stat-label { color: rgba(255,255,255,0.6); font-size: 0.78rem; margin-bottom: 0.3rem; }
        .stat-value { color: #ffd700; font-size: 1.5rem; font-weight: 900; }
        .section-title { font-size: 1rem; font-weight: 800; margin-bottom: 0.75rem; }
        .progress-list { display: grid; gap: 0.7rem; }
        .progress-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1rem;
            border-radius: 14px;
            background: rgba(255,255,255,0.08);
        }
        .progress-left { display: flex; flex-direction: column; gap: 0.15rem; }
        .progress-name { font-weight: 700; }
        .progress-sub { color: rgba(255,255,255,0.55); font-size: 0.8rem; }
        .score-pill { color: #ffd700; font-weight: 900; }
        .actions { display: flex; gap: 0.7rem; flex-wrap: wrap; margin-top: 1rem; }
        .btn {
            border: none;
            border-radius: 14px;
            padding: 0.95rem 1.1rem;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-primary { background: linear-gradient(135deg, #ffd700, #ffa000); color: #1b5e20; }
        .btn-secondary { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.16); }
        .btn-danger { background: rgba(255,82,82,0.22); color: #ffb8b8; border: 1px solid rgba(255,82,82,0.2); }
        @media (max-width: 900px) {
            .hero, .grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 640px) {
            body { padding: 1rem; }
            .hero, .grid { grid-template-columns: 1fr; }
            .profile-card { align-items: flex-start; }
            .avatar { width: 70px; height: 70px; border-radius: 20px; font-size: 1.6rem; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="topbar">
            <a class="back" href="dashboard.html">← Back to Dashboard</a>
            <h1>Profile</h1>
            <a class="back" href="settings.html">Settings →</a>
        </div>

        <div class="hero">
            <div class="card profile-card">
                <div class="avatar" id="avatar">P</div>
                <div>
                    <div class="name" id="name">Player</div>
                    <div class="email" id="email">player@srm.edu</div>
                    <div class="badges">
                        <span class="badge" id="role-badge">Explorer</span>
                        <span class="badge" id="mode-badge">Offline ready</span>
                    </div>
                    <div class="actions">
                        <a class="btn btn-primary" href="map.html">Open Campus Map</a>
                        <button class="btn btn-secondary" onclick="scrollToProgress()">View Progress</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="section-title">Quick Stats</div>
                <div class="grid" style="grid-template-columns: 1fr 1fr; margin: 0;">
                    <div class="stat">
                        <div class="stat-label">Buildings</div>
                        <div class="stat-value" id="stat-buildings">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Points</div>
                        <div class="stat-value" id="stat-points">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Best Stars</div>
                        <div class="stat-value" id="stat-stars">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Rank</div>
                        <div class="stat-value" id="stat-rank">—</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" id="progress-card">
            <div class="section-title">Building Progress</div>
            <div class="progress-list" id="progress-list"></div>
        </div>

        <div class="actions">
            <a class="btn btn-secondary" href="dashboard.html">Dashboard</a>
            <a class="btn btn-secondary" href="map.html">Campus Map</a>
            <button class="btn btn-danger" onclick="resetProfile()">Reset Local Progress</button>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../data/puzzles.js"></script>
    <script>
        if (!Auth.isLoggedIn()) {
            window.location.href = '../index.html';
        }

        var user = Auth.getCurrentUser() || {};
        var progress = Storage.load();
        var displayName = user.name || user.username || 'Player';
        var email = user.email || 'player@srm.edu';

        document.getElementById('name').textContent = displayName;
        document.getElementById('email').textContent = email;
        document.getElementById('avatar').textContent = displayName.charAt(0).toUpperCase();
        document.getElementById('role-badge').textContent = user.isAdmin ? 'Admin Explorer' : 'Explorer';
        document.getElementById('mode-badge').textContent = window.SRM_USE_BACKEND === true ? 'Backend sync on' : 'Offline mode';

        var completedCount = PUZZLES_DATA.buildingOrder.filter(function(id) {
            return progress.completed.includes(id);
        }).length;
        document.getElementById('stat-buildings').textContent = completedCount;
        document.getElementById('stat-points').textContent = progress.totalScore || 0;
        document.getElementById('stat-stars').textContent = Object.values(progress.scores).reduce(function(sum, entry) {
            return sum + (entry.best >= 800 ? 3 : entry.best >= 500 ? 2 : 1);
        }, 0);

        function renderRank() {
            var users = Auth.getUsers();
            var entries = Object.keys(users).map(function(emailKey) {
                var localUser = users[emailKey];
                return {
                    name: localUser.name || localUser.username || 'Player',
                    score: emailKey === email ? (progress.totalScore || 0) : 0
                };
            }).sort(function(a, b) { return b.score - a.score; });

            var rank = entries.findIndex(function(entry) {
                return entry.name === displayName;
            });
            document.getElementById('stat-rank').textContent = rank >= 0 ? '#' + (rank + 1) : '—';
        }

        function renderProgress() {
            var list = document.getElementById('progress-list');
            list.innerHTML = '';
            PUZZLES_DATA.buildingOrder.forEach(function(id) {
                var building = PUZZLES_DATA.buildings[id];
                var scoreData = progress.scores[id];
                var best = scoreData ? scoreData.best : 0;
                var attempts = scoreData ? scoreData.attempts : 0;
                var completed = progress.completed.includes(id);
                var item = document.createElement('div');
                item.className = 'progress-item';
                item.innerHTML =
                    '<div class="progress-left">' +
                        '<div class="progress-name">' + building.emoji + ' ' + building.name + '</div>' +
                        '<div class="progress-sub">' + building.theme + ' • ' + (completed ? 'Completed' : 'Not completed') + ' • ' + attempts + ' attempt(s)</div>' +
                    '</div>' +
                    '<div class="score-pill">' + best + ' pts</div>';
                list.appendChild(item);
            });
        }

        function scrollToProgress() {
            document.getElementById('progress-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function resetProfile() {
            if (!confirm('Reset local progress and settings on this device?')) return;
            Storage.reset();
            localStorage.removeItem('srmEscapeSettings');
            window.location.reload();
        }

        renderRank();
        renderProgress();
    </script>
</body>
</html>
